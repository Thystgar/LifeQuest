# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  location: northeurope

jobs:
  buildServer:
    name: Build server
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: Server

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Azure CLI Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        auth-type: SERVICE_PRINCIPAL

    #upload image
    - name: Azure ACR login
      run: az acr login --name lifequest
    - name: Publish container
      run: dotnet publish --os linux --arch x64 /t:PublishContainer -p ContainerRegistry=lifequest.azurecr.io
      #run: dotnet publish --os linux --arch x64 /t:PublishContainer -p ContainerRegistry=lifequest.azurecr.io/lifequest-api:${{ github.run_number }}
  
  deployShared:
    name: Deploy shared
    needs: buildServer
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: Deployment
    steps:
    - uses: actions/checkout@v4
    - name: Azure CLI Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        auth-type: SERVICE_PRINCIPAL
    # on subscription level create RGs, in identities create identities, in shared create acr + assign access, in logging create log workspace
    # - name: Deploy shared resources
    #   run: |
    #     az config set bicep.use_binary_from_path=false
    #     az deployment group create --resource-group lifequest-shared --parameters lifequest-shared.bicepparam
    - name: Deploy shared resources
      run: |
        az config set bicep.use_binary_from_path=false
        az deployment sub create --location ${{ env.location }} --parameters lifequest-setup.bicepparam

  deployEnv:
    name: Deploy Test
    needs: deployShared
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: Deployment
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Azure CLI Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        auth-type: SERVICE_PRINCIPAL
    - name: Deploy test database
      run: |
        az config set bicep.use_binary_from_path=false
        az deployment group create --resource-group lifequest-test --template-file lifequest-db.bicep --parameters environment='test'
    # - name: Add access to EntraId
    #   shell: pwsh
    #   run: |
    #     Set-PSRepository -Name 'PSGallery' -InstallationPolicy Trusted
    #     Install-Module Microsoft.Entra
    #     $token = (az account get-access-token --resource "https://graph.microsoft.com/" | ConvertFrom-Json).accessToken | ConvertTo-SecureString -AsPlainText -Force
    #     Connect-Entra -AccessToken $token
    #     $managedIdentity = Get-EntraServicePrincipal -Filter "displayName eq 'lifequest-test-db'"
    #     Add-EntraDirectoryRoleMember -DirectoryRoleId 88d8e3e3-8f55-4a1e-953a-9b9898b8876b -MemberId $managedIdentity.Id
    #     Add-EntraGroupMember -GroupId 6896d772-3988-4cae-8cd7-6ebe133ed09c -MemberId $managedIdentity.Id
    # https://learn.microsoft.com/en-us/ef/core/cli/dotnet#aspnet-core-environment
    - name: Run EF Core migrations
      working-directory: Server/LifeQuest.Api
      run: |
        ls
        dotnet tool install --global dotnet-ef
        dotnet build
        export PATH="$PATH:/home/runner/.dotnet/tools"
        dotnet ef database update -- --environment test --verbose

    - name: Deploy test environment
      run: |
        az config set bicep.use_binary_from_path=false
        az deployment group create --resource-group lifequest-test --template-file lifequest-api.bicep --parameters environment='test'
  
  buildApp:
    name: Build Android app
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: Client
    steps:
    - uses: actions/checkout@v4
    - name: Install npm dependencies
      run: |
        npm install
    - name: Build Android Release
      run: |
        cd android && bash ./gradlew assembleRelease
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lifequest-app.apk
        path: android/app/build/outputs/apk/release/